name: Onya CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Test deps: pytest-asyncio drives the async store suite; hypothesis powers the
          # interp property tests. Both are declared in the [dev] extra.
          pip install ruff pytest pytest-mock pytest-asyncio hypothesis
          # Install Onya itself (base install; asyncpg is intentionally omitted, so the
          # PostgreSQL backend's lazy-import and skip paths are exercised).
          pip install -U .

      - name: Lint with ruff
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          ruff check --select=E9,F63,F7,F82 --target-version=py312 .
          # Run default ruff checks
          ruff check --target-version=py312 .

      - name: Test with pytest
        run: |
          # Exclude integration tests (live PostgreSQL); they also self-skip without
          # ONYA_TEST_PG_DSN, but the marker keeps the default run unambiguous.
          pytest test/ -v -m "not integration"
